# Application Properties
spring.application.name=inventoria-backend

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/inventoria
spring.data.mongodb.database=inventoria

# Server Configuration
server.port=8080

# JWT Configuration
jwt.secret=your-secret-key-change-this-in-production-use-a-strong-key-here-at-least-32-characters-long
jwt.expiration=86400000

# Logging Configuration
logging.level.root=INFO
logging.level.com.inventoria=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# File Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
upload.dir=uploads/

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:5173
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true
